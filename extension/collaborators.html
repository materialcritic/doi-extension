<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DOI Grabber — Collaborators</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #17171a;
      --surface: #212126;
      --surface-2: #2a2a30;
      --border: #34343c;
      --text: #ece9e4;
      --text-dim: #9d9a94;
      --accent: #c98a4b;
      --err: #e0574a;
    }

    :root[data-theme="parchment"] {
      --bg: #f2ece0;
      --surface: #ffffff;
      --surface-2: #e7ddc8;
      --border: #d8cbae;
      --text: #2a2723;
      --text-dim: #726a5c;
      --accent: #b4783c;
      --err: #c0392b;
    }

    :root[data-theme="slate"] {
      --bg: #eef1f4;
      --surface: #ffffff;
      --surface-2: #e3e8ee;
      --border: #d3dae3;
      --text: #23282f;
      --text-dim: #6b7280;
      --accent: #4f6d8f;
      --err: #c0392b;
    }

    :root[data-theme="sage"] {
      --bg: #f0f2ec;
      --surface: #ffffff;
      --surface-2: #e4e8dc;
      --border: #d4dac6;
      --text: #262b22;
      --text-dim: #6f7566;
      --accent: #6b8e5a;
      --err: #c0392b;
    }

    :root[data-theme="minimal"] {
      --bg: #ffffff;
      --surface: #f7f7f7;
      --surface-2: #f0f0f0;
      --border: #dddddd;
      --text: #111111;
      --text-dim: #6e6e6e;
      --accent: #111111;
      --err: #b3261e;
    }

    :root[data-theme="carrot"] {
      --bg: #fdf3e7;
      --surface: #ffffff;
      --surface-2: #fbe4c4;
      --border: #f0c98a;
      --text: #3a2410;
      --text-dim: #8a6a3c;
      --accent: #e8752c;
      --err: #c0392b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 32px;
      max-width: 640px;
      margin: 0 auto;
    }

    body.graph-active {
      max-width: 820px;
    }

    header { margin-bottom: 20px; display: flex; align-items: flex-start; }
    header .header-text { flex: 1; }
    header h1 { font-size: 20px; font-weight: 600; }
    header p { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; }

    #btn-theme-toggle {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }

    #btn-theme-toggle:hover { background: var(--surface); }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    #btn-toggle-view {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    #btn-toggle-view:hover { background: var(--surface); }

    #graph-view {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      padding: 12px;
    }

    #graph-view svg {
      width: 100%;
      height: auto;
      display: block;
    }

    #graph-view .hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      text-align: center;
    }

    .graph-node-label {
      font-size: 9px;
      fill: var(--text-dim);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .graph-center-label {
      font-size: 11px;
      font-weight: 600;
      fill: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .graph-node circle {
      fill: var(--accent);
      opacity: 0.85;
      transition: opacity 0.15s;
    }

    .graph-node:hover circle { opacity: 1; }
    .graph-node:hover .graph-node-label { fill: var(--text); }

    #list {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    a.collab-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      text-decoration: none;
      color: inherit;
    }

    a.collab-row:last-child { border-bottom: none; }
    a.collab-row:hover { background: var(--surface-2); }

    .collab-name {
      flex: 1;
      font-size: 13.5px;
    }

    .collab-count {
      font-size: 12px;
      color: var(--accent);
      font-family: "SF Mono", "Courier New", monospace;
      flex-shrink: 0;
    }

    .collab-bar {
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.5;
    }

    #error, #empty {
      padding: 40px 0;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    #error { color: var(--err); }

    .skeleton-list {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .skeleton-row {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .skeleton-row:last-child { border-bottom: none; }

    .skeleton-bar {
      height: 11px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: skeleton-pulse 1.4s ease-in-out infinite;
    }

    @keyframes skeleton-pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
  <script src="theme.js"></script>
</head>
<body>
  <header>
    <div class="header-text">
      <h1 id="author-name">Loading…</h1>
      <p id="subtitle">Finding co-authors on Crossref…</p>
    </div>
    <button id="btn-theme-toggle" title="Toggle theme" data-theme-icon>☀</button>
  </header>

  <div id="loading">
    <div class="skeleton-list">
      <div class="skeleton-row"><div class="skeleton-bar" style="width: 55%;"></div></div>
      <div class="skeleton-row"><div class="skeleton-bar" style="width: 42%;"></div></div>
      <div class="skeleton-row"><div class="skeleton-bar" style="width: 63%;"></div></div>
      <div class="skeleton-row"><div class="skeleton-bar" style="width: 38%;"></div></div>
      <div class="skeleton-row"><div class="skeleton-bar" style="width: 50%;"></div></div>
    </div>
  </div>
  <div id="error" style="display: none;"></div>
  <div id="empty" style="display: none;">No co-authored works found for this person.</div>

  <div class="toolbar" id="view-toolbar" style="display: none;">
    <button id="btn-toggle-view">Show Network Graph</button>
  </div>

  <div id="list" style="display: none;"></div>
  <div id="graph-view" style="display: none;"></div>

  <script src="collaborators.js"></script>
</body>
</html>
