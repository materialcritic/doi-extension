<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DOI Grabber — Download Entire Journal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #17171a;
      --surface: #212126;
      --surface-2: #2a2a30;
      --surface-2-hover: #34343c;
      --border: #34343c;
      --text: #ece9e4;
      --text-dim: #9d9a94;
      --accent: #c98a4b;
      --accent-hover: #dd9c5c;
      --accent-text: #201406;
      --ok: #4caf78;
      --err: #e0574a;
    }

    :root[data-theme="parchment"] {
      --bg: #f2ece0;
      --surface: #ffffff;
      --surface-2: #e7ddc8;
      --surface-2-hover: #dccdae;
      --border: #d8cbae;
      --text: #2a2723;
      --text-dim: #726a5c;
      --accent: #b4783c;
      --accent-hover: #c68a4d;
      --accent-text: #ffffff;
      --ok: #2f8f5d;
      --err: #c0392b;
    }

    :root[data-theme="slate"] {
      --bg: #eef1f4;
      --surface: #ffffff;
      --surface-2: #e3e8ee;
      --surface-2-hover: #d3dae3;
      --border: #d3dae3;
      --text: #23282f;
      --text-dim: #6b7280;
      --accent: #4f6d8f;
      --accent-hover: #5f7fa3;
      --accent-text: #ffffff;
      --ok: #2f8f5d;
      --err: #c0392b;
    }

    :root[data-theme="sage"] {
      --bg: #f0f2ec;
      --surface: #ffffff;
      --surface-2: #e4e8dc;
      --surface-2-hover: #d4dac6;
      --border: #d4dac6;
      --text: #262b22;
      --text-dim: #6f7566;
      --accent: #6b8e5a;
      --accent-hover: #7fa06d;
      --accent-text: #ffffff;
      --ok: #2f8f5d;
      --err: #c0392b;
    }

    :root[data-theme="minimal"] {
      --bg: #ffffff;
      --surface: #f7f7f7;
      --surface-2: #f0f0f0;
      --surface-2-hover: #e2e2e2;
      --border: #dddddd;
      --text: #111111;
      --text-dim: #6e6e6e;
      --accent: #111111;
      --accent-hover: #333333;
      --accent-text: #ffffff;
      --ok: #1a7a4c;
      --err: #b3261e;
    }

    :root[data-theme="carrot"] {
      --bg: #fdf3e7;
      --surface: #ffffff;
      --surface-2: #fbe4c4;
      --surface-2-hover: #f5d4a4;
      --border: #f0c98a;
      --text: #3a2410;
      --text-dim: #8a6a3c;
      --accent: #e8752c;
      --accent-hover: #f28943;
      --accent-text: #ffffff;
      --ok: #4a8f3c;
      --err: #c0392b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 820px;
      margin: 0 auto;
      padding-bottom: 48px;
    }

    header {
      padding: 24px 24px 16px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    header p {
      font-size: 12.5px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    #toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: 12px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    #toolbar-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button:hover:not(:disabled) { background: var(--surface-2-hover); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.primary {
      background: var(--accent);
      color: var(--accent-text);
      border: none;
    }

    button.primary:hover:not(:disabled) { background: var(--accent-hover); }

    #totals-text {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    #status-text {
      font-size: 12.5px;
      color: var(--text-dim);
    }

    #progress-bar-wrap {
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 10px;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s ease;
    }

    #groups {
      padding: 16px 24px 0;
    }

    details.issue-group {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      margin-bottom: 10px;
      overflow: hidden;
    }

    details.issue-group summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      user-select: none;
    }

    details.issue-group summary::-webkit-details-marker { display: none; }

    summary .chevron {
      transition: transform 0.15s;
      color: var(--text-dim);
      flex-shrink: 0;
      font-size: 11px;
    }

    details[open] summary .chevron { transform: rotate(90deg); }

    summary .group-checkbox {
      flex-shrink: 0;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    summary .group-label {
      font-size: 13.5px;
      font-weight: 600;
      flex: 1;
    }

    summary .group-status {
      font-size: 11.5px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    summary .group-status.ok { color: var(--ok); }
    summary .group-status.err { color: var(--err); }
    summary .group-status.active { color: var(--accent); }

    .group-works {
      border-top: 1px solid var(--border);
    }

    .work-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .work-row:last-child { border-bottom: none; }

    .work-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .work-title.clickable {
      cursor: pointer;
      text-decoration: underline dotted;
      text-underline-offset: 3px;
      text-decoration-color: var(--text-dim);
    }

    .work-abstract-inline {
      flex-basis: 100%;
      font-size: 11.5px;
      line-height: 1.5;
      color: var(--text-dim);
      padding-top: 2px;
    }

    .work-status {
      flex-shrink: 0;
      color: var(--text-dim);
      min-width: 90px;
      text-align: right;
    }

    .work-status.ok { color: var(--ok); }
    .work-status.err { color: var(--err); }
    .work-status.active { color: var(--accent); }
    .work-status.removed { color: var(--text-dim); text-decoration: line-through; opacity: 0.6; }

    .row-checkbox {
      flex-shrink: 0;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .row-checkbox:disabled { cursor: default; }

    .work-row.row-skip .work-title { color: var(--text-dim); opacity: 0.6; }

    #error, #empty {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    #error { color: var(--err); }

    #loading {
      padding: 16px 24px 0;
    }

    .skeleton-group {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .skeleton-bar {
      height: 11px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: skeleton-pulse 1.4s ease-in-out infinite;
    }

    @keyframes skeleton-pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
  <script src="theme.js"></script>
</head>
<body>
  <header>
    <h1 id="journal-title">Loading…</h1>
    <p id="subtitle">Fetching every issue from Crossref…</p>
  </header>

  <div id="toolbar" style="display: none;">
    <div id="toolbar-controls">
      <button id="btn-start" class="primary">Start Download</button>
      <button id="btn-pause" disabled>Pause</button>
      <button id="btn-cancel" disabled>Cancel</button>
    </div>
    <div id="totals-text"></div>
    <div id="status-text"></div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div id="loading">
    <div class="skeleton-group"><div class="skeleton-bar" style="width: 30%;"></div></div>
    <div class="skeleton-group"><div class="skeleton-bar" style="width: 25%;"></div></div>
    <div class="skeleton-group"><div class="skeleton-bar" style="width: 35%;"></div></div>
    <div class="skeleton-group"><div class="skeleton-bar" style="width: 28%;"></div></div>
    <div class="skeleton-group"><div class="skeleton-bar" style="width: 32%;"></div></div>
  </div>
  <div id="error" style="display: none;"></div>
  <div id="empty" style="display: none;">No downloadable works with a volume number found.</div>

  <div id="groups"></div>

  <script src="journal-download.js"></script>
</body>
</html>
